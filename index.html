<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Shopping Mall 1999</title>
  <link href="https://fonts.googleapis.com/css2?family=IM+Fell+English:ital@0;1&family=IM+Fell+English+SC&family=Lato:wght@300;400&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --warm-white: #faf7f2;
      --dark: #1a1a1a;
      --muted: #6b6358;
      --accent: #8b7355;
      --rule: #c9bfaf;
    }

    html, body {
      height: 100%;
      margin: 0;
    }

    body {
      font-family: 'Lato', sans-serif;
      font-weight: 300;
      background-color: var(--warm-white);
      display: flex;
      flex-direction: column;
      min-height: 100vh;
    }

    /* ── NAV ── */
    nav {
      display: flex;
      justify-content: center;
      gap: 3rem;
      padding: 2.2rem 2rem 0;
      animation: fadeDown 0.9s ease both;
    }

    nav a {
      font-family: 'Lato', sans-serif;
      font-weight: 400;
      font-size: 0.72rem;
      letter-spacing: 0.22em;
      text-transform: uppercase;
      color: var(--dark);
      text-decoration: none;
      opacity: 0.6;
      transition: opacity 0.2s;
    }

    nav a:hover { opacity: 1; }

    /* ── TITLE BLOCK ── */
    .title-block {
      text-align: center;
      padding: 2.5rem 2rem 0;
      animation: fadeDown 1.1s ease both;
    }

    .eyebrow {
      font-family: 'Lato', sans-serif;
      font-weight: 300;
      font-size: 0.7rem;
      letter-spacing: 0.3em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 0.9rem;
    }

    h1 {
      font-family: 'IM Fell English SC', serif;
      font-size: clamp(2.4rem, 6vw, 4.5rem);
      color: var(--dark);
      line-height: 1.05;
      letter-spacing: 0.02em;
      margin-bottom: 0.5rem;
    }

    .subtitle {
      font-family: 'IM Fell English', serif;
      font-style: italic;
      font-size: clamp(0.88rem, 1.8vw, 1.05rem);
      color: var(--muted);
      line-height: 1.7;
      margin-bottom: 1.8rem;
    }

    .cta-btn {
      display: inline-block;
      font-family: 'Lato', sans-serif;
      font-weight: 400;
      font-size: 0.78rem;
      letter-spacing: 0.25em;
      text-transform: uppercase;
      color: var(--warm-white);
      background: var(--dark);
      padding: 0.85rem 2.4rem;
      text-decoration: none;
      transition: background 0.2s, transform 0.2s;
    }

    .cta-btn:hover {
      background: var(--accent);
      transform: translateY(-2px);
    }

    /* ── ILLUSTRATION ── */
    .illustration {
      width: 100%;
      max-width: 700px;
      margin: 0 auto;
      display: block;
      animation: fadeUp 1.3s ease both;
    }

    .illustration img {
      width: 100%;
      height: auto;
      display: block;
    }

    /* ── FOOTER ── */
    footer {
      text-align: center;
      padding: 2.2rem 2rem;
      font-family: 'Lato', sans-serif;
      font-size: 0.7rem;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: var(--muted);
      border-top: 1px solid var(--rule);
      margin-top: auto;
    }

    @keyframes fadeDown {
      from { opacity: 0; transform: translateY(-12px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(16px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    @media (max-width: 600px) {
      nav { gap: 1.8rem; }
    }
  </style>
</head>
<body>

    <nav>
      <a href="index.html">Home</a>
      <a href="game.html">Enter the Mall</a>
      <a href="about-project.html">About the Project</a>
    </nav>

    <div class="title-block">
      <p class="eyebrow">An Interactive Learning Experience</p>
      <h1>Shopping Mall<br/>1999</h1>
      <p class="subtitle">Somewhere between the food court and the forgotten wing,<br/>something is waiting to be learned.</p>
      <a href="game.html" class="cta-btn">Enter the Mall</a>
    </div>

    <div class="illustration">
      <img src="mall.png" alt="A black cat sits in front of the entrance to a shopping mall at dusk" />
    </div>

  <footer>
    &copy; 2025 &nbsp;·&nbsp; University of Central Florida &nbsp;·&nbsp; Texts &amp; Technology
  </footer>

</body>
</html>
